services:
  - type: web
    name: ibtikar-backend
    env: python
    buildCommand: pip install -r Desktop/ibtikar-backend-main/requirements-prod.txt
    startCommand: sh -c "cd Desktop/ibtikar-backend-main && export PYTHONPATH=. && uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: production
      - key: X_CLIENT_ID
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: IBTIKAR_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ibtikar-db
          property: connectionString

databases:
  - name: ibtikar-db
    databaseName: ibtikar
    user: ibtikar
    plan: free
